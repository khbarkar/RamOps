images:
  - location: "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-amd64.img"
    arch: "x86_64"
  - location: "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-arm64.img"
    arch: "aarch64"
cpus: 2
memory: "4GiB"
disk: "20GiB"

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      
      hostnamectl set-hostname alertmanager
      apt-get update
      apt-get install -y wget curl postgresql
      
      # Install Prometheus
      PROM_VERSION="2.48.0"
      ARCH=$(uname -m)
      if [ "$ARCH" = "aarch64" ]; then
        PROM_ARCH="arm64"
      else
        PROM_ARCH="amd64"
      fi
      wget -q https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-${PROM_ARCH}.tar.gz
      tar xzf prometheus-${PROM_VERSION}.linux-${PROM_ARCH}.tar.gz
      cp prometheus-${PROM_VERSION}.linux-${PROM_ARCH}/prometheus /usr/local/bin/
      cp prometheus-${PROM_VERSION}.linux-${PROM_ARCH}/promtool /usr/local/bin/
      mkdir -p /etc/prometheus /var/lib/prometheus
      rm -rf prometheus-${PROM_VERSION}.linux-${PROM_ARCH}*
      
      # Install Alertmanager
      AM_VERSION="0.26.0"
      wget -q https://github.com/prometheus/alertmanager/releases/download/v${AM_VERSION}/alertmanager-${AM_VERSION}.linux-${PROM_ARCH}.tar.gz
      tar xzf alertmanager-${AM_VERSION}.linux-${PROM_ARCH}.tar.gz
      cp alertmanager-${AM_VERSION}.linux-${PROM_ARCH}/alertmanager /usr/local/bin/
      cp alertmanager-${AM_VERSION}.linux-${PROM_ARCH}/amtool /usr/local/bin/
      mkdir -p /etc/alertmanager /var/lib/alertmanager
      rm -rf alertmanager-${AM_VERSION}.linux-${PROM_ARCH}*
      
      # Configure Prometheus with alert rules
      cat > /etc/prometheus/prometheus.yml << 'PROMEOF'
      global:
        scrape_interval: 5s
        evaluation_interval: 5s
      
      alerting:
        alertmanagers:
          - static_configs:
              - targets: ['localhost:9093']
      
      rule_files:
        - /etc/prometheus/alert.rules.yml
      
      scrape_configs:
        - job_name: 'prometheus'
          static_configs:
            - targets: ['localhost:9090']
        - job_name: 'node'
          static_configs:
            - targets: ['localhost:9100']
      PROMEOF
      
      # Create alert rules - multiple cascading alerts from one root cause
      cat > /etc/prometheus/alert.rules.yml << 'RULEEOF'
      groups:
        - name: infrastructure
          interval: 5s
          rules:
            # ROOT CAUSE - Disk full
            - alert: DiskSpaceCritical
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 10s
              labels:
                severity: critical
                component: infrastructure
                layer: root_cause
                team: platform
              annotations:
                summary: "Disk space critically low on {{ $labels.instance }}"
                description: "Available disk space is {{ $value | humanize }}B"
            
            # LAYER 1 - Direct database impacts
            - alert: DatabaseWritesFailing
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 8s
              labels:
                severity: critical
                component: database
                layer: direct_impact
                team: database
              annotations:
                summary: "Database cannot write to disk"
                description: "PostgreSQL write operations failing"
            
            - alert: DatabaseTransactionLogFull
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 8s
              labels:
                severity: critical
                component: database
                layer: direct_impact
                team: database
              annotations:
                summary: "Database transaction log cannot grow"
            
            - alert: DatabaseConnectionPoolExhausted
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 7s
              labels:
                severity: critical
                component: database
                layer: direct_impact
                team: database
              annotations:
                summary: "All database connections in use"
            
            # LAYER 2 - Application layer failures
            - alert: APIHealthCheckFailing
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 6s
              labels:
                severity: critical
                component: api
                layer: application
                team: backend
              annotations:
                summary: "API health check endpoint returning 503"
            
            - alert: APIErrorRate5xx
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 6s
              labels:
                severity: critical
                component: api
                layer: application
                team: backend
              annotations:
                summary: "API 5xx error rate at 67%"
            
            - alert: APILatencyP99High
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 5s
              labels:
                severity: warning
                component: api
                layer: application
                team: backend
              annotations:
                summary: "API P99 latency > 8000ms"
            
            - alert: APILatencyP95High
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 5s
              labels:
                severity: warning
                component: api
                layer: application
                team: backend
              annotations:
                summary: "API P95 latency > 5000ms"
            
            - alert: AuthServiceDown
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 6s
              labels:
                severity: critical
                component: auth
                layer: application
                team: security
              annotations:
                summary: "Authentication service unavailable"
            
            - alert: SessionStoreUnavailable
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 6s
              labels:
                severity: critical
                component: sessions
                layer: application
                team: backend
              annotations:
                summary: "Session store cannot be reached"
            
            # LAYER 3 - Cache and queue impacts
            - alert: RedisCacheMissRateHigh
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 5s
              labels:
                severity: warning
                component: cache
                layer: supporting_services
                team: platform
              annotations:
                summary: "Redis cache miss rate at 94%"
            
            - alert: CacheEvictionRateHigh
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 5s
              labels:
                severity: warning
                component: cache
                layer: supporting_services
                team: platform
              annotations:
                summary: "Cache eviction rate abnormally high"
            
            - alert: MessageQueueBacklog
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 5s
              labels:
                severity: warning
                component: queue
                layer: supporting_services
                team: platform
              annotations:
                summary: "Message queue backlog growing: 15,000 messages"
            
            - alert: MessageQueueConsumerLag
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 5s
              labels:
                severity: warning
                component: queue
                layer: supporting_services
                team: platform
              annotations:
                summary: "Queue consumer lag increasing"
            
            # LAYER 4 - User-facing impacts
            - alert: UserLoginFailureSpike
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 4s
              labels:
                severity: critical
                component: frontend
                layer: user_impact
                team: frontend
              annotations:
                summary: "User login failure rate at 89%"
            
            - alert: CheckoutProcessFailing
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 4s
              labels:
                severity: critical
                component: checkout
                layer: user_impact
                team: payments
              annotations:
                summary: "Checkout process failing for users"
            
            - alert: PageLoadTimeoutRate
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 4s
              labels:
                severity: warning
                component: frontend
                layer: user_impact
                team: frontend
              annotations:
                summary: "Page load timeout rate at 45%"
            
            # LAYER 5 - Resource exhaustion symptoms
            - alert: ApplicationMemoryHigh
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 5s
              labels:
                severity: warning
                component: app
                layer: resources
                team: platform
              annotations:
                summary: "Application memory usage at 92%"
            
            - alert: CPUUsageHigh
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 5s
              labels:
                severity: warning
                component: app
                layer: resources
                team: platform
              annotations:
                summary: "CPU usage sustained above 85%"
            
            - alert: ThreadPoolExhausted
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 5s
              labels:
                severity: warning
                component: app
                layer: resources
                team: backend
              annotations:
                summary: "Application thread pool at capacity"
            
            # LAYER 6 - Monitoring and logging impacts
            - alert: LogShippingFailing
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 4s
              labels:
                severity: warning
                component: logging
                layer: observability
                team: platform
              annotations:
                summary: "Cannot ship logs to aggregator"
            
            - alert: MetricsCollectionDelayed
              expr: node_filesystem_avail_bytes{mountpoint="/"} < 3000000000
              for: 4s
              labels:
                severity: warning
                component: metrics
                layer: observability
                team: platform
              annotations:
                summary: "Metrics collection falling behind"
      RULEEOF
      
      # Install and configure node_exporter for filesystem metrics
      NODE_EXP_VERSION="1.7.0"
      wget -q https://github.com/prometheus/node_exporter/releases/download/v${NODE_EXP_VERSION}/node_exporter-${NODE_EXP_VERSION}.linux-${PROM_ARCH}.tar.gz
      tar xzf node_exporter-${NODE_EXP_VERSION}.linux-${PROM_ARCH}.tar.gz
      cp node_exporter-${NODE_EXP_VERSION}.linux-${PROM_ARCH}/node_exporter /usr/local/bin/
      rm -rf node_exporter-${NODE_EXP_VERSION}.linux-${PROM_ARCH}*
      
      cat > /etc/systemd/system/node_exporter.service << 'NODEEOF'
      [Unit]
      Description=Node Exporter
      After=network.target
      
      [Service]
      Type=simple
      ExecStart=/usr/local/bin/node_exporter
      Restart=always
      
      [Install]
      WantedBy=multi-user.target
      NODEEOF
      
      systemctl daemon-reload
      systemctl enable node_exporter
      systemctl start node_exporter
      
      # Wait for node_exporter to start
      sleep 5
      
      # Configure Alertmanager
      cat > /etc/alertmanager/alertmanager.yml << 'AMEOF'
      global:
        resolve_timeout: 5m
      
      route:
        receiver: 'default'
        group_wait: 1s
        group_interval: 1s
        repeat_interval: 5m
      
      receivers:
        - name: 'default'
      AMEOF
      
      # Create systemd services
      cat > /etc/systemd/system/prometheus.service << 'PROMSVC'
      [Unit]
      Description=Prometheus
      After=network.target
      
      [Service]
      Type=simple
      ExecStart=/usr/local/bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/var/lib/prometheus
      Restart=always
      
      [Install]
      WantedBy=multi-user.target
      PROMSVC
      
      cat > /etc/systemd/system/alertmanager.service << 'AMSVC'
      [Unit]
      Description=Alertmanager
      After=network.target
      
      [Service]
      Type=simple
      ExecStart=/usr/local/bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/var/lib/alertmanager
      Restart=always
      
      [Install]
      WantedBy=multi-user.target
      AMSVC
      
      systemctl daemon-reload
      systemctl enable prometheus alertmanager
      systemctl start prometheus alertmanager
      
      # Fill disk to trigger alerts (leave ~15% free to trigger < 20% condition)
      dd if=/dev/zero of=/var/fillfile bs=1M count=15000 2>/dev/null || true
      
      echo "Monitoring stack provisioned - disk filled to trigger alert storm"

portForwards:
  - guestPort: 9090
    hostPort: 9090
  - guestPort: 9093
    hostPort: 9093
